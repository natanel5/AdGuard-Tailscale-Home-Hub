# docker-compose.yml
services:
  # AdGuard Home: The primary DNS filter
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    network_mode: host # Required for proper network visibility on Pi
    volumes:
      - ./adguard/conf:/opt/adguardhome/conf:rw
      - ./adguard/work:/opt/adguardhome/work:rw

  # Unbound: The recursive DNS resolver for privacy
  unbound:
    image: klutchell/unbound:latest
    container_name: unbound
    platform: linux/arm64/v8 # Force ARM64 architecture
    restart: unless-stopped
    network_mode: host # Required for proper network visibility on Pi
    volumes:
      - ./unbound:/etc/unbound:rw
      - ./unbound/unbound.conf:/etc/unbound/unbound.conf:ro
      - ./unbound/root.hints:/etc/unbound/root.hints:ro

  # Tailscale: Secure remote access & Exit Node
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    hostname: tailscale-pi
    restart: unless-stopped
    network_mode: host # Essential for Exit Node and Routing performance
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_MODULE
    volumes:
      - ./tailscale/state:/var/lib/tailscale:rw # Persistent state storage
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_ROUTES=10.0.0.0/24 # Route local network through Tailscale
      - TS_USERSPACE=false # Use kernel WireGuard for better performance
      - TS_EXTRA_ARGS=--advertise-exit-node # Automatically advertise as an exit node
