server:
    # Interface and port settings
    interface: 127.0.0.1
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no
    
    # Path to root hints file
    root-hints: "/etc/unbound/root.hints"

    # Hardening and Security
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes
    harden-short-bufsize: yes
    harden-large-queries: yes
    qname-minimisation: yes
    use-caps-for-id: yes # Security feature (0x20 encoding)

    # Privacy and Identity
    hide-identity: yes
    hide-version: yes

    # Anti-DNS Rebinding (Prevent external responses from pointing to LAN)
    private-address: 192.168.0.0/16
    private-address: 172.16.0.0/12
    private-address: 10.0.0.0/8

    # Performance and Caching
    prefetch: yes
    num-threads: 1
    
    # Slabs should match num-threads (Power of 2) to reduce overhead
    msg-cache-slabs: 1
    rrset-cache-slabs: 1
    infra-cache-slabs: 1
    key-cache-slabs: 1
    
    # Cache sizes
    rrset-cache-size: 100m
    msg-cache-size: 50m

    # Logging (Production optimized)
    verbosity: 1
    log-queries: no

    # Socket buffer sizes (0 = system default, can be increased if needed)
    so-rcvbuf: 0
    so-sndbuf: 0